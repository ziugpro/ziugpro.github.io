<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Roblox Lua Obfuscator</title>
<style>
  body {
    background: #121212;
    color: #00ff88;
    font-family: 'Consolas', monospace;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px;
  }
  h1 {
    margin-bottom: 20px;
    text-shadow: 0 0 10px #00ff88;
  }
  textarea {
    width: 90vw;
    max-width: 700px;
    height: 200px;
    background: #1e1e1e;
    border: 2px solid #00ff88;
    border-radius: 8px;
    color: #00ff88;
    padding: 15px;
    font-size: 16px;
    resize: vertical;
    box-shadow: 0 0 10px #00ff88;
    margin-bottom: 20px;
  }
  label, button {
    background: #00ff88;
    border: none;
    padding: 12px 25px;
    margin: 5px;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
    color: #121212;
    box-shadow: 0 0 15px #00ff88;
    user-select: none;
    transition: background 0.3s ease;
  }
  label:hover, button:hover {
    background: #00cc6a;
  }
  input[type="file"] {
    display: none;
  }
  .btn-group {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 700px;
  }
</style>
</head>
<body>

<h1>Roblox Lua Obfuscator</h1>

<textarea id="input" placeholder="Paste your Lua code or upload a file"></textarea>
<textarea id="output" placeholder="Obfuscated code" readonly></textarea>

<label for="fileInput">Upload Lua File</label>
<input type="file" id="fileInput" accept=".lua,text/plain" />

<div class="btn-group">
  <button id="encode">Obfuscate</button>
  <button id="download">Download</button>
  <button id="copy">Copy</button>
  <button id="clear">Clear</button>
</div>

<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const fileInput = document.getElementById('fileInput');
const encodeBtn = document.getElementById('encode');
const downloadBtn = document.getElementById('download');
const copyBtn = document.getElementById('copy');
const clearBtn = document.getElementById('clear');

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    input.value = reader.result;
  };
  reader.readAsText(file);
});

function randomName(len=6) {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
  let res = '';
  for(let i=0; i<len; i++) {
    res += chars.charAt(Math.floor(Math.random()*chars.length));
  }
  return '_' + res;
}

function encodeString(str) {
  let arr = [];
  for(let i=0; i<str.length; i++) {
    arr.push(str.charCodeAt(i));
  }
  return 'string.char(' + arr.join(',') + ')';
}

function obfuscateLua(code) {
  const keywords = new Set([
    'and', 'break', 'do', 'else', 'elseif', 'end', 'false', 'for', 'function', 'goto',
    'if', 'in', 'local', 'nil', 'not', 'or', 'repeat', 'return', 'then', 'true', 'until', 'while'
  ]);
  const tokenRegex = /([a-zA-Z_]\w*)|("(?:[^"\\]|\\.)*")|('(?:[^'\\]|\\.)*')/g;

  let map = {};
  return code.replace(tokenRegex, (match, p1, p2, p3) => {
    if(p1) {
      if(keywords.has(p1)) return p1;
      if(!map[p1]) map[p1] = randomName(6);
      return map[p1];
    }
    if(p2) {
      const content = p2.slice(1, -1);
      return encodeString(content);
    }
    if(p3) {
      const content = p3.slice(1, -1);
      return encodeString(content);
    }
    return match;
  });
}

encodeBtn.addEventListener('click', () => {
  if(!input.value.trim()) {
    alert('Please enter code or upload a file.');
    return;
  }
  const result = obfuscateLua(input.value);
  output.value = '-- ziugpro.github.io/obf - Premium\n' + result;
});

downloadBtn.addEventListener('click', () => {
  if(!output.value.trim()) {
    alert('Nothing to download.');
    return;
  }
  const blob = new Blob([output.value], {type: 'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'obfuscated.lua';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});

copyBtn.addEventListener('click', () => {
  if(!output.value.trim()) {
    alert('Nothing to copy.');
    return;
  }
  navigator.clipboard.writeText(output.value).then(() => alert('Copied to clipboard.'));
});

clearBtn.addEventListener('click', () => {
  input.value = '';
  output.value = '';
  fileInput.value = '';
});
</script>

</body>
</html>
