<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Access Denied</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron&display=swap');
  body {
    margin: 0;
    background: #0a0a0a;
    color: #f44336;
    font-family: 'Orbitron', monospace, monospace;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    user-select: none;
  }
  .block-container {
    text-align: center;
    border: 3px solid #f44336;
    padding: 30px 50px;
    border-radius: 15px;
    box-shadow: 0 0 20px #f44336;
    max-width: 480px;
  }
  .block-container h1 {
    font-size: 3rem;
    margin-bottom: 20px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .block-container p {
    font-size: 1.2rem;
    margin-bottom: 30px;
    line-height: 1.5;
    color: #ff7961;
  }
  .block-container .error-code {
    font-size: 5rem;
    font-weight: 900;
    margin-bottom: 15px;
    color: #f44336;
    text-shadow: 0 0 15px #ff1744;
  }
  .block-container .hint {
    font-size: 0.9rem;
    color: #b71c1c;
  }
</style>
</head>
<body>
  <div class="block-container">
    <div class="error-code">403</div>
    <h1>Access Denied</h1>
    <p>You do not have permission to access this resource.</p>
    <div class="hint">If you believe this is an error, contact the administrator.</div>
  </div>

<script id="luaScript" type="text/plain">
print("Lua code chạy ngon lành!")
</script>
<script>
function loadLuaCode() {
  const luaScript = document.getElementById('luaScript').textContent;
  console.log(luaScript);
}
loadLuaCode();
</script>
</body>
</html>
